runtime: python312
entrypoint: gunicorn -b :$PORT app:app

env_variables:
  FLASK_ENV: 'production'
  PYTHONUNBUFFERED: '1'

instance_class: F1

automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 1
  max_instances: 10
  min_idle_instances: 1
  max_idle_instances: automatic
  min_pending_latency: automatic
  max_pending_latency: automatic

handlers:
- url: /.*
  script: auto
  secure: always

